version: "3.9"

services:
  user-db:
    image: postgres:16
    container_name: user-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_service
      POSTGRES_USER: postgres_name
      POSTGRES_PASSWORD: POSTGRES_PASSWORD
    ports:
      - "5436:5432"
    volumes:
      - user_db_data:/var/lib/postgresql/data

volumes:
  user_db_data: